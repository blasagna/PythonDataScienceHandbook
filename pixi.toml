[workspace]
authors = ["Bob DiMaiolo <bdimaiolo@gmail.com>"]
channels = ["conda-forge"]
name = "PythonDataScienceHandbook"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
nb = "jupyter lab ."

[dependencies]
python = ">=3.14.6,<3.15"
numpy = ">=2.4.6,<3"
pandas = ">=3.0.3,<4"
scipy = ">=1.18.0,<2"
scikit-learn = ">=1.9.0,<2"
scikit-image = ">=0.26.0,<0.27"
pillow = ">=12.2.0,<13"
matplotlib = ">=3.11.0,<4"
seaborn = ">=0.13.2,<0.14"
jupyter = ">=1.1.1,<2"
memory_profiler = ">=0.61.0,<0.62"
numexpr = ">=2.14.1,<3"
pandas-datareader = ">=0.10.0,<0.11"
netcdf4 = ">=1.7.4,<2"
